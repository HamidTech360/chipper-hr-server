[build]
builder = "NESTJS"
buildCommand = "npx prisma generate && npx prisma migrate deploy && npm run build"
startCommand = "npm run start:prod"

[deploy]
healthcheckPath = "/"
healthcheckInterval = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[environment]
NODE_ENV = "production"
